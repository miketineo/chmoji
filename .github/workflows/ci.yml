name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: zsh syntax check
        run: zsh -n chmoji.plugin.zsh

      - name: shellcheck (errors only, bash mode)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'
          severity: error
          additional_files: 'chmoji.plugin.zsh'
        env:
          SHELLCHECK_OPTS: '-s bash -e SC1071,SC2296,SC2016,SC2206,SC2207'

  vim:
    name: vim/${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: vim-8.2,        version: v8.2.0000, neovim: false }
          - { name: vim-stable,     version: stable,    neovim: false }
          - { name: neovim-stable,  version: stable,    neovim: true  }
          - { name: neovim-nightly, version: nightly,   neovim: true  }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ${{ matrix.name }}
        id: vim
        uses: rhysd/action-setup-vim@v1
        with:
          version: ${{ matrix.version }}
          neovim: ${{ matrix.neovim }}

      - name: Run themis suite
        env:
          VIM_BIN: ${{ steps.vim.outputs.executable }}
        run: ./test/run.sh

  data-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate data.json
        run: |
          jq 'type == "object" and length > 1000' autoload/chmoji/data.json | grep -q true
          jq -r '."tada", ."rocket"' autoload/chmoji/data.json | grep -q "🎉"
          echo "data.json: $(jq 'length' autoload/chmoji/data.json) entries"
